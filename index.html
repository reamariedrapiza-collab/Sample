<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Firebase Login</title>
<style>
body{
    font-family:Arial;
    background:#f4f4f4;
}
.container{
    width:320px;
    margin:100px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
}
input,button{
    width:100%;
    padding:10px;
    margin:8px 0;
}
button{
    background:#007BFF;
    color:white;
    border:none;
    cursor:pointer;
}
button:hover{
    background:#0056b3;
}
</style>
</head>

<body>

<div class="container">
<h2>Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button id="login">Login</button>

<p id="msg"></p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAjgQjzkfR7gsdgyBicdtSGRJF9jt7KXt4",
  authDomain: "planning-with-ai-8c513.firebaseapp.com",
  projectId: "planning-with-ai-8c513",
  storageBucket: "planning-with-ai-8c513.firebasestorage.app",
  messagingSenderId: "482282817546",
  appId: "1:482282817546:web:afc8ca3ab27b153eb7f7f3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("login").onclick=()=>{

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)
.then(()=>{
location="dashboard.html";
})
.catch(e=>{
document.getElementById("msg").innerHTML=e.message;
});

}

onAuthStateChanged(auth,user=>{
if(user){
location="dashboard.html";
}
});

</script>

</body>
</html>
